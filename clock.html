<!DOCTYPE html>\n<html lang=\"de\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <meta name=\"theme-color\" content=\"#1a1a2e\">\n    <meta name=\"description\" content=\"Digital Clock - Multiple Time Zones\">\n    <title>Digital Clock - Time Zones</title>\n    <link rel=\"stylesheet\" href=\"clock-styles.css\">\n</head>\n<body>\n    <div class=\"container\">\n        <header>\n            <h1>⏰ Digital Clock</h1>\n            <p class=\"subtitle\">Multiple Time Zones</p>\n        </header>\n\n        <main>\n            <!-- Controls -->\n            <section class=\"controls-section\">\n                <div class=\"control-group\">\n                    <label for=\"timezoneSelect\">Add Time Zone:</label>\n                    <select id=\"timezoneSelect\">\n                        <option value=\"\">-- Select a Time Zone --</option>\n                    </select>\n                    <button id=\"addBtn\" class=\"btn btn-add\">+ Add</button>\n                </div>\n                <button id=\"resetBtn\" class=\"btn btn-reset\">Reset All</button>\n            </section>\n\n            <!-- Clocks Grid -->\n            <section class=\"clocks-section\">\n                <div id=\"clocksContainer\" class=\"clocks-grid\">\n                    <!-- Clocks will be added here dynamically -->\n                </div>\n            </section>\n\n            <!-- Settings -->\n            <section class=\"settings-section\">\n                <div class=\"setting-group\">\n                    <label>\n                        <input type=\"checkbox\" id=\"use24Hour\" checked>\n                        Use 24-Hour Format\n                    </label>\n                </div>\n                <div class=\"setting-group\">\n                    <label>\n                        <input type=\"checkbox\" id=\"showSeconds\" checked>\n                        Show Seconds\n                    </label>\n                </div>\n                <div class=\"setting-group\">\n                    <label>\n                        <input type=\"checkbox\" id=\"showDate\" checked>\n                        Show Date\n                    </label>\n                </div>\n            </section>\n        </main>\n\n        <footer>\n            <p>Digital Clock v1.0 | Timezone Display</p>\n        </footer>\n    </div>\n\n    <script src=\"timezones.js\"></script>\n    <script src=\"clock-app.js\"></script>\n</body>\n</html>"
